<!DOCTYPE html>
<html>
<head>
    <title>Calories Burned Predictor</title>
</head>
<body>
    <h1>Calories Burned Predictor</h1>
<p>Enter your exercise details below:</p>

<form action="/predict" method="post">

    <label>Gender:</label>
    <select name="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>
    <br><br>

    <label>Age:</label>
    <input type="number" name="age" required>
    <br><br>

    <label>Height (cm):</label>
    <input type="number" name="height" step="0.1" required>
    <br><br>

    <label>Weight (kg):</label>
    <input type="number" name="weight" step="0.1" required>
    <br><br>

    <label>Duration (minutes):</label>
    <input type="number" name="duration" required>
    <br><br>

    <label>Heart Rate (bpm):</label>
    <input type="number" name="heart_rate" required>
    <br><br>

    <label>Body Temperature (°C):</label>
    <input type="number" name="body_temp" step="0.1" required>
    <br><br>

    <button type="submit">Predict Calories</button>

</form>
 {% if result %}
        <h2>Predicted Calories Burned: {{ result }}</h2>
    {% endif %}
</body>
</html>
